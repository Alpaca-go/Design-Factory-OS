appId: com.masterpieceos.desktop
productName: Masterpiece OS Desktop
artifactName: Masterpiece-OS-Desktop-${version}-${arch}.${ext}
directories:
  output: release
electronDist: node_modules/electron/dist
files:
  - out/**/*
  - package.json
asar: true
asarUnpack:
  - node_modules/sharp/**/*
  - node_modules/@img/**/*
extraResources:
  - from: ../../prompts
    to: prompts
    filter:
      - v5/**/*
win:
  target:
    - nsis
  executableName: Masterpiece OS Desktop
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Masterpiece OS Desktop
